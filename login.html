<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | منصة التوظيف</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* زر العودة */
    .back-home {
      text-align: center;
      margin-top: 20px;
    }
    .back-home a {
      display: inline-block;
      padding: 10px 20px;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: #fff;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .back-home a:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.5);
    }
  </style>
</head>
<body class="login-page">
  <div class="bg-bubble b1"></div>
  <div class="bg-bubble b2"></div>
  <div class="bg-bubble b3"></div>

  <header class="glass-header">
    <div class="container nav">
      <div class="logo">HireZone!</div>
      <nav>
        <a href="index.html">الرئيسية</a>
        <a href="about.html">عن المنصة</a>
        <a href="#">الوظائف</a>
      </nav>
      <a href="login.html" class="login-btn btn ripple">تسجيل الدخول</a>
    </div>
  </header>

  <main class="login-hero">
    <div class="login-card glass" data-reveal>
      <h1 class="login-title">تسجيل الدخول</h1>
      <p class="login-sub">اختر نوع حسابك للتسجيل</p>

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="seeker" role="tab" aria-selected="true">
          باحث عن عمل
        </button>
        <button class="tab" data-tab="company" role="tab" aria-selected="false">
          شركة
        </button>
      </div>

      <form class="form visible" id="form-seeker">
        <label class="field float">
          <input type="email" placeholder=" " required>
          <span>البريد الإلكتروني</span>
        </label>
        <label class="field float">
          <input type="password" placeholder=" " required minlength="6">
          <span>كلمة المرور</span>
        </label>
        <label class="check">
          <input type="checkbox"> تذكرني
        </label>
        <button type="submit" class="btn gradient full ripple">دخول كباحث عن عمل</button>
        <div class="helpers">
          <a href="#">نسيت كلمة المرور؟</a>
          <span>•</span>
          <a href="register.html">إنشاء حساب جديد</a>
        </div>
      </form>

      <form class="form" id="form-company">
        <label class="field float">
          <input type="email" placeholder=" " required>
          <span>البريد المؤسسي</span>
        </label>
        <label class="field float">
          <input type="password" placeholder=" " required minlength="6">
          <span>كلمة المرور</span>
        </label>
        <label class="check">
          <input type="checkbox"> تذكرني
        </label>
        <button type="submit" class="btn gradient full ripple">تسجيل الدخول للشركات</button>
        <div class="helpers">
          <a href="#">نسيت كلمة المرور؟</a>
          <span>•</span>
          <a href="#">إنشاء حساب شركة</a>
        </div>
      </form>

      <!-- زر العودة للصفحة الرئيسية -->
      <div class="back-home">
        <a href="index.html">← العودة إلى الصفحة الرئيسية</a>
      </div>

    </div>
  </main>

  <footer class="glass-footer">
    <p>© <span id="year"></span> منصة التوظيف - جميع الحقوق محفوظة لشركة UpKnowledge </p>
  </footer>

  <script src="app.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
