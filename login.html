<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | منصة التوظيف</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <div class="bg-bubble b1"></div>
  <div class="bg-bubble b2"></div>
  <div class="bg-bubble b3"></div>

  <header class="glass-header">
    <div class="container nav">
      <div class="logo">HireZone!</div>
      <nav>
        <a href="index.html">الرئيسية</a>
        <a href="about.html">عن المنصة</a>
        <a href="#">الوظائف</a>
      </nav>
      <a href="login.html" class="login-btn btn ripple">تسجيل الدخول</a>
    </div>
  </header>

  <main class="login-hero">
    <div class="login-card glass" data-reveal>
      <div class="login-logo">📄</div>
      <h1 class="login-title">تسجيل الدخول</h1>
      <p class="login-sub">اختر نوع حسابك للتسجيل</p>

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="seeker" role="tab" aria-selected="true">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.33 0-8 2.17-8 5v1h16v-1c0-2.83-3.67-5-8-5Z" fill="currentColor"/></svg>
          باحث عن عمل
        </button>
        <button class="tab" data-tab="company" role="tab" aria-selected="false">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3h8v6h10v12H3Zm2 2v14h6V5Zm8 6v8h6v-8Z" fill="currentColor"/></svg>
          شركة
        </button>
      </div>

      <form class="form visible" id="form-seeker">
        <label class="field float">
          <input type="email" placeholder=" " required>
          <span>البريد الإلكتروني</span>
          <i class="ico">
            <svg viewBox="0 0 24 24"><path d="M2 6h20v12H2Zm10 5L2 7m20 0-10 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </i>
        </label>

        <label class="field float">
          <input type="password" placeholder=" " required minlength="6">
          <span>كلمة المرور</span>
          <i class="ico">
            <svg viewBox="0 0 24 24"><path d="M6 10h12v10H6Zm2 0V7a4 4 0 0 1 8 0v3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </i>
        </label>

        <label class="check">
          <input type="checkbox"> تذكرني
        </label>

        <button type="submit" class="btn gradient full ripple">دخول كباحث عن عمل</button>

        <div class="helpers">
          <a href="#">نسيت كلمة المرور؟</a>
          <span>•</span>
          <a href="#">إنشاء حساب جديد</a>
        </div>
      </form>

      <form class="form" id="form-company">
        <label class="field float">
          <input type="email" placeholder=" " required>
          <span>البريد المؤسسي</span>
          <i class="ico">
            <svg viewBox="0 0 24 24"><path d="M2 6h20v12H2Zm10 5L2 7m20 0-10 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </i>
        </label>

        <label class="field float">
          <input type="password" placeholder=" " required minlength="6">
          <span>كلمة المرور</span>
          <i class="ico">
            <svg viewBox="0 0 24 24"><path d="M6 10h12v10H6Zm2 0V7a4 4 0 0 1 8 0v3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </i>
        </label>

        <label class="field">
          <span style="display:block;margin-bottom:6px;color:#e5e7eb">رمز الشركة (اختياري)</span>
          <input type="text" class="input" placeholder="مثال: HZ-2025">
        </label>

        <label class="check">
          <input type="checkbox"> تذكرني
        </label>

        <button type="submit" class="btn gradient full ripple">تسجيل الدخول للشركات</button>

        <div class="helpers">
          <a href="#">نسيت كلمة المرور؟</a>
          <span>•</span>
          <a href="#">إنشاء حساب شركة</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="glass-footer">
    <p>© <span id="year"></span> منصة التوظيف - جميع الحقوق محفوظة</p>
  </footer>

  <script src="app.js"></script>
  <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
</body>
</html>
