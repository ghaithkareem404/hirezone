<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إنشاء حساب جديد | HireZone</title>
  <link rel="stylesheet" href="register.css" />
</head>
<body class="reg-page">
  <!-- فقاعات خلفية متحركة -->
  <div class="bg-bubble b1"></div>
  <div class="bg-bubble b2"></div>
  <div class="bg-bubble b3"></div>

  <main class="wrap">
    <section class="card glass" data-reveal>
      <div class="head">
        <h1>إنشاء حساب جديد</h1>
        <p>انضم إلى HireZone وابدأ رحلتك الآن</p>
      </div>

      <!-- نوع الحساب -->
      <div class="tabs" role="tablist" aria-label="نوع الحساب">
        <button class="tab active" data-type="seeker" aria-selected="true">
          <img src="icons/user.svg" alt="" /> باحث عن عمل
        </button>
        <button class="tab" data-type="company" aria-selected="false">
          <img src="icons/building.svg" alt="" /> شركة
        </button>
      </div>

      <!-- النموذج -->
      <form id="registerForm" novalidate>
        <div class="grid">
          <label class="field float">
            <input type="text" id="fullName" placeholder=" " required />
            <span>الاسم الكامل</span>
            <i class="ico"><img src="icons/user.svg" alt="" /></i>
            <small class="err"></small>
          </label>

          <label class="field float">
            <input type="email" id="email" placeholder=" " required />
            <span>البريد الإلكتروني</span>
            <i class="ico"><img src="icons/email.svg" alt="" /></i>
            <small class="err"></small>
          </label>

          <label class="field float">
            <input type="password" id="password" placeholder=" " required minlength="6" />
            <span>كلمة المرور (6 أحرف فأكثر)</span>
            <i class="ico"><img src="icons/lock.svg" alt="" /></i>
            <small class="err"></small>
          </label>

          <label class="field float">
            <input type="password" id="confirm" placeholder=" " required minlength="6" />
            <span>تأكيد كلمة المرور</span>
            <i class="ico"><img src="icons/lock.svg" alt="" /></i>
            <small class="err"></small>
          </label>
        </div>

        <!-- حقول الشركة (تظهر فقط عند اختيار شركة) -->
        <div id="companyFields" class="company hidden">
          <label class="field float">
            <input type="text" id="companyName" placeholder=" " />
            <span>اسم الشركة</span>
            <i class="ico"><img src="icons/building.svg" alt="" /></i>
            <small class="err"></small>
          </label>

          <label class="field float">
            <input type="text" id="companyLocation" placeholder=" " />
            <span>موقع الشركة</span>
            <i class="ico"><img src="icons/location.svg" alt="" /></i>
            <small class="err"></small>
          </label>
        </div>

        <label class="check">
          <input type="checkbox" id="terms" required />
          أوافق على الشروط وسياسة الخصوصية
        </label>

        <button type="submit" class="btn gradient ripple full">إنشاء الحساب</button>
      </form>

      <div class="alt">
        لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
      </div>

      <div class="back-home">
        <a href="index.html">← العودة إلى الصفحة الرئيسية</a>
      </div>
    </section>
  </main>

  <script>
    // تبديل نوع الحساب + إظهار حقول الشركة
    const tabs = document.querySelectorAll('.tabs .tab');
    const companyFields = document.getElementById('companyFields');
    let accountType = 'seeker';

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        accountType = tab.dataset.type;
        companyFields.classList.toggle('hidden', accountType !== 'company');
      });
    });

    // تحقق أساسي من الحقول
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const fullName = document.getElementById('fullName');
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const confirm = document.getElementById('confirm');
      const terms = document.getElementById('terms');
      const companyName = document.getElementById('companyName');
      const companyLocation = document.getElementById('companyLocation');

      // مسح رسائل الأخطاء
      form.querySelectorAll('.err').forEach(el => el.textContent = '');

      let valid = true;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

      if (!fullName.value.trim()) {
        fullName.nextElementSibling.nextElementSibling.nextElementSibling.textContent = 'الاسم مطلوب';
        valid = false;
      }
      if (!emailRegex.test(email.value.trim())) {
        email.nextElementSibling.nextElementSibling.nextElementSibling.textContent = 'بريد غير صالح';
        valid = false;
      }
      if (password.value.length < 6) {
        password.nextElementSibling.nextElementSibling.nextElementSibling.textContent = 'الحد الأدنى 6 أحرف';
        valid = false;
      }
      if (confirm.value !== password.value) {
        confirm.nextElementSibling.nextElementSibling.nextElementSibling.textContent = 'كلمتا المرور غير متطابقتين';
        valid = false;
      }
      if (!terms.checked) {
        alert('يجب الموافقة على الشروط والمتطلبات.');
        valid = false;
      }
      if (accountType === 'company') {
        if (!companyName.value.trim()) {
          companyName.nextElementSibling.nextElementSibling.nextElementSibling.textContent = 'اسم الشركة مطلوب';
          valid = false;
        }
        if (!companyLocation.value.trim()) {
          companyLocation.nextElementSibling.nextElementSibling.nextElementSibling.textContent = 'موقع الشركة مطلوب';
          valid = false;
        }
      }

      if (!valid) return;

      alert('تم إنشاء الحساب بنجاح!');
    });

    // حركة ظهور بسيطة عند التحميل
    document.querySelectorAll('[data-reveal]').forEach(el => {
      el.style.opacity = 0;
      el.style.transform = 'translateY(10px)';
      setTimeout(() => {
        el.style.transition = 'opacity .5s ease, transform .5s ease';
        el.style.opacity = 1;
        el.style.transform = 'translateY(0)';
      }, 50);
    });
  </script>
</body>
</html>
